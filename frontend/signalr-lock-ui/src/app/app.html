<div class="app-shell">
  <header class="app-header">
    <h1>🔐 SignalR Record-Level Locking — POC</h1>
    <div class="header-meta">
      Logged in as <strong>{{ auth.currentUser.displayName }}</strong>
    </div>
  </header>

  <main class="app-content">
    <div
      *ngIf="bannerMessage"
      class="banner"
      [class.banner--info]="bannerTone === 'info'"
      [class.banner--warn]="bannerTone === 'warn'"
      [class.banner--error]="bannerTone === 'error'"
      [class.banner--success]="bannerTone === 'success'"
      role="status"
    >
      <span>{{ bannerMessage }}</span>
      <button
        *ngIf="canAcquireFromToolbar"
        type="button"
        class="btn btn--acquire"
        (click)="onAcquireFromToolbar()"
      >
        Acquire Lock
      </button>
    </div>

    <section class="workspace-layout">
      <div class="workspace-layout__list">
        <app-records-list
          [records]="records"
          [loading]="loading"
          [error]="error"
          [pendingAcquireRecordId]="pendingAcquireRecordId"
          [selectedRecordId]="activeRecord?.id || null"
          (openRecord)="onOpenRecord($event)"
        ></app-records-list>
      </div>

      <aside class="workspace-layout__panel">
        <app-record-dialog
          *ngIf="selectedRecord"
          [record]="selectedRecord"
          [connectionLost]="connectionLost"
          (banner)="onPanelBanner($event)"
          (closed)="onDialogClosed($event)"
        ></app-record-dialog>

        <section *ngIf="!selectedRecord" class="panel-empty" aria-live="polite">
          <h2>Select a record</h2>
          <p>Choose a row from the list to open its details and lock state on this panel.</p>
        </section>
      </aside>
    </section>
  </main>
</div>
