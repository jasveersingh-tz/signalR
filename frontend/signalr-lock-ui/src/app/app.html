<div class="app-shell">
  <header class="app-header">
    <h1>SignalR Record-Level Locking — POC</h1>
    <div class="header-meta">
      Logged in as <strong>{{ auth.currentUser.displayName }}</strong>
    </div>
  </header>

  <main class="split-panel">
    <div class="panel-left">
      <app-record-list
        [records]="records"
        (recordSelected)="onRecordSelected($event)"
      />
    </div>
    <div class="panel-right">
      @if (selectedRecordId) {
        <app-record-editor [recordId]="selectedRecordId" (closed)="selectedRecordId = null" />
      } @else {
        <div class="placeholder">Select a record from the list to edit.</div>
      }
    </div>
  </main>
</div>
