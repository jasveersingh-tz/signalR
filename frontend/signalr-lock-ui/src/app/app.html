<div class="app-shell">
  <header class="app-header">
    <h1>🔐 SignalR Record-Level Locking — POC</h1>
    <div class="header-meta">
      Logged in as <strong>{{ auth.currentUser.displayName }}</strong>
    </div>
  </header>

  <main class="app-content">
    @if (bannerMessage) {
      <p class="banner" role="status">{{ bannerMessage }}</p>
    }

    <app-records-list
      [records]="records"
      [loading]="loading"
      [error]="error"
      [pendingAcquireRecordId]="pendingAcquireRecordId"
      (openRecord)="onOpenRecord($event)"
    />

    @if (selectedRecord) {
      <app-record-dialog
        [record]="selectedRecord"
        [connectionLost]="connectionLost()"
        (closed)="onDialogClosed($event)"
      />
    }
  </main>
</div>
